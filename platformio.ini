[env:esp12e]
platform = espressif8266@4.2.1
board = esp12e
framework = arduino
upload_speed = 57600
upload_resetmethod = nodemcu
monitor_speed = 74880
monitor_dtr = 0
monitor_rts = 0
lib_deps =
    bblanchon/ArduinoJson@7.4.3
    knolleary/PubSubClient@2.8.0
build_flags =
    '-DROUTER_WATCHDOG_FIRMWARE_VERSION="0.1.0"'
